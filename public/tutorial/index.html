<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>舜天信兴样衣管理系统讲解动画 | Sample Management System Tour</title>
    <style>
      :root {
        --ink: #112331;
        --muted: #586979;
        --blue: #1f74c9;
        --glass: linear-gradient(145deg, rgb(255 255 255 / 0.76), rgb(255 255 255 / 0.26));
        --border: 1px solid rgb(255 255 255 / 0.56);
        --shadow: 0 26px 90px rgb(50 79 105 / 0.2);
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          linear-gradient(120deg, rgb(236 246 255 / 0.26), rgb(255 255 255 / 0.1)),
          url("../liquid-glass-desktop.png") center / cover fixed,
          #dfeaf6;
      }

      button,
      a {
        font: inherit;
      }

      .tour {
        min-height: 100vh;
        padding: clamp(14px, 2.2vw, 28px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 16px;
      }

      .topbar,
      .caption,
      .glass,
      .hud-card,
      .phone,
      .scene-card,
      .sample-card,
      .side-rail,
      .ppt-slide {
        border: var(--border);
        background: var(--glass);
        box-shadow: var(--shadow), inset 0 1px 0 rgb(255 255 255 / 0.62);
        backdrop-filter: blur(26px) saturate(165%);
        -webkit-backdrop-filter: blur(26px) saturate(165%);
        border-radius: 8px;
      }

      .topbar {
        min-height: 70px;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        min-width: 0;
      }

      .brand-mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: rgb(255 255 255 / 0.72);
        color: var(--blue);
        font-weight: 900;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(18px, 2.2vw, 30px);
        line-height: 1.05;
      }

      .brand p,
      .caption p,
      .scene-card p,
      .hud-card span,
      .sample-card span,
      .subtitle-en {
        color: var(--muted);
      }

      .brand p,
      .scene-card p,
      .caption p {
        margin: 4px 0 0;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .controls button,
      .controls a {
        min-height: 38px;
        border-radius: 8px;
        border: var(--border);
        color: var(--ink);
        background: rgb(255 255 255 / 0.62);
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        cursor: pointer;
        font-weight: 800;
      }

      .stage {
        position: relative;
        display: grid;
        grid-template-columns: 190px minmax(0, 1fr) minmax(280px, 0.36fr);
        gap: 16px;
        min-height: 0;
      }

      .side-rail {
        padding: 14px;
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .side-rail button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: rgb(255 255 255 / 0.42);
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        font-weight: 800;
      }

      .side-rail button.active {
        color: #0d4d93;
        background: rgb(255 255 255 / 0.82);
      }

      .main-stage {
        position: relative;
        min-height: 0;
        overflow: hidden;
        --cursor-x: 50%;
        --cursor-y: 50%;
      }

      .scene-card {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
        gap: 18px;
        padding: clamp(16px, 2vw, 26px);
        opacity: 0;
        transform: translateY(28px) scale(0.985);
        transition: opacity 800ms ease, transform 900ms ease;
      }

      .scene-card.active {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .motion-layer {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      .tour-cursor,
      .click-ring,
      .action-bubble {
        position: absolute;
        left: var(--cursor-x);
        top: var(--cursor-y);
      }

      .tour-cursor {
        width: 34px;
        height: 34px;
        transform: translate(-5px, -3px) rotate(-12deg);
        transition: left 850ms cubic-bezier(0.2, 0.9, 0.2, 1), top 850ms cubic-bezier(0.2, 0.9, 0.2, 1);
        filter: drop-shadow(0 12px 20px rgb(18 48 78 / 0.32));
      }

      .tour-cursor::before {
        content: "";
        position: absolute;
        width: 0;
        height: 0;
        border-top: 28px solid #0d4d93;
        border-right: 15px solid transparent;
        border-left: 5px solid transparent;
      }

      .tour-cursor::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 20px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #ffffff;
        border: 3px solid #0d4d93;
      }

      .click-ring {
        width: 62px;
        height: 62px;
        border-radius: 999px;
        border: 3px solid rgb(31 116 201 / 0.72);
        transform: translate(-31px, -31px) scale(0.62);
        opacity: 0;
      }

      .main-stage.is-clicking .click-ring {
        animation: clickPulse 1.4s ease-out infinite;
      }

      .main-stage.is-dragging .tour-cursor {
        animation: dragNudge 1.8s ease-in-out infinite;
      }

      .action-bubble {
        max-width: min(360px, 44vw);
        transform: translate(22px, 20px);
        padding: 10px 12px;
        border-radius: 8px;
        border: var(--border);
        background: rgb(255 255 255 / 0.86);
        color: #123047;
        box-shadow: 0 18px 50px rgb(50 79 105 / 0.2), inset 0 1px 0 rgb(255 255 255 / 0.72);
        font-size: 13px;
        font-weight: 900;
        line-height: 1.4;
        transition: left 850ms cubic-bezier(0.2, 0.9, 0.2, 1), top 850ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      .action-bubble small {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-weight: 700;
      }

      .process-strip {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .process-strip button {
        min-height: 26px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 0 9px;
        border: 0;
        border-radius: 999px;
        background: rgb(255 255 255 / 0.52);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .process-strip button.active {
        background: rgb(255 255 255 / 0.92);
        color: #0d4d93;
        box-shadow: inset 0 0 0 1px rgb(31 116 201 / 0.2);
      }

      @keyframes clickPulse {
        0% {
          opacity: 0.95;
          transform: translate(-31px, -31px) scale(0.45);
        }
        82% {
          opacity: 0;
          transform: translate(-31px, -31px) scale(1.28);
        }
        100% {
          opacity: 0;
          transform: translate(-31px, -31px) scale(1.28);
        }
      }

      @keyframes dragNudge {
        0%,
        100% {
          transform: translate(-5px, -3px) rotate(-12deg);
        }
        50% {
          transform: translate(30px, 18px) rotate(-12deg);
        }
      }

      .scene-copy {
        display: grid;
        align-content: center;
        gap: 16px;
      }

      .scene-copy small {
        color: var(--blue);
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .scene-copy h2 {
        margin: 0;
        font-size: clamp(28px, 5vw, 62px);
        line-height: 1.02;
      }

      .scene-copy p {
        max-width: 780px;
        font-size: clamp(15px, 1.2vw, 20px);
        line-height: 1.65;
      }

      .visual {
        position: relative;
        min-height: 0;
        display: grid;
        place-items: center;
      }

      .hud-grid {
        width: min(100%, 720px);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .hud-card {
        padding: 14px;
        min-height: 110px;
        display: grid;
        gap: 6px;
      }

      .hud-card strong {
        font-size: 30px;
      }

      .waterfall {
        width: min(100%, 760px);
        columns: 3 150px;
        column-gap: 12px;
      }

      .sample-card {
        display: inline-grid;
        width: 100%;
        margin-bottom: 12px;
        overflow: hidden;
        break-inside: avoid;
        background: rgb(255 255 255 / 0.76);
      }

      .sample-card img {
        width: 100%;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        display: block;
      }

      .sample-card div {
        padding: 9px;
        display: grid;
        gap: 4px;
      }

      .phone {
        width: min(320px, 100%);
        aspect-ratio: 9 / 16;
        padding: 12px;
        display: grid;
        grid-template-rows: 36px 1fr auto;
        gap: 10px;
        background: rgb(255 255 255 / 0.58);
      }

      .phone-bar,
      .search-pill,
      .mini-row,
      .chat-line,
      .ppt-line {
        border-radius: 8px;
        background: rgb(255 255 255 / 0.68);
        border: var(--border);
      }

      .phone-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
      }

      .phone img {
        width: 100%;
        height: 100%;
        min-height: 0;
        object-fit: contain;
        background: #fff;
        border-radius: 8px;
      }

      .detail-mock {
        width: min(100%, 760px);
        display: grid;
        grid-template-columns: 1fr 0.86fr;
        gap: 12px;
      }

      .image-pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .image-pair img {
        width: 100%;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        border-radius: 8px;
        background: #fff;
      }

      .detail-info {
        display: grid;
        gap: 8px;
      }

      .mini-row {
        min-height: 44px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      .ppt-slide {
        width: min(100%, 700px);
        aspect-ratio: 16 / 9;
        padding: 18px;
        display: grid;
        grid-template-columns: 0.9fr 1fr;
        gap: 16px;
      }

      .ppt-slide img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #fff;
        border-radius: 8px;
      }

      .ppt-lines {
        display: grid;
        align-content: center;
        gap: 10px;
      }

      .ppt-line {
        min-height: 26px;
      }

      .right-panel {
        display: grid;
        gap: 12px;
        grid-template-rows: auto 1fr;
        min-height: 0;
      }

      .timeline {
        padding: 14px;
        display: grid;
        gap: 10px;
      }

      .timeline h3 {
        margin: 0;
      }

      .progress {
        height: 10px;
        border-radius: 999px;
        background: rgb(255 255 255 / 0.48);
        overflow: hidden;
      }

      .progress i {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #1f74c9, #86cfff);
        border-radius: inherit;
      }

      .chapter-list {
        padding: 14px;
        overflow: auto;
      }

      .chapter-list ol {
        list-style: none;
        display: grid;
        gap: 7px;
        padding: 0;
        margin: 0;
      }

      .chapter-list li {
        padding: 8px 10px;
        border-radius: 8px;
        color: var(--muted);
        background: rgb(255 255 255 / 0.28);
        font-size: 13px;
        cursor: pointer;
      }

      .chapter-list li.active {
        color: #0d4d93;
        background: rgb(255 255 255 / 0.78);
        font-weight: 900;
      }

      .caption {
        min-height: 108px;
        padding: 14px 18px;
        display: grid;
        gap: 6px;
      }

      .action-caption {
        width: fit-content;
        max-width: 100%;
        margin: 0;
        padding: 7px 10px;
        border-radius: 8px;
        background: rgb(31 116 201 / 0.1);
        color: #0d4d93;
        font-weight: 900;
      }

      .caption strong {
        font-size: clamp(17px, 1.5vw, 22px);
      }

      .caption p {
        font-size: clamp(14px, 1.1vw, 18px);
        line-height: 1.45;
      }

      .search-pill {
        min-height: 50px;
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 10px;
        font-weight: 800;
      }

      .chat-card {
        width: min(100%, 560px);
        display: grid;
        gap: 10px;
      }

      .chat-line {
        padding: 12px;
      }

      @media (max-width: 980px) {
        body {
          overflow: auto;
        }

        .tour {
          min-height: auto;
        }

        .topbar,
        .stage {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .main-stage {
          min-height: 720px;
        }

        .side-rail {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .scene-card {
          grid-template-columns: 1fr;
          overflow: auto;
        }

        .right-panel {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="tour" data-duration="180" data-motion-demo="process-click-tour">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <h1>舜天信兴样衣管理系统</h1>
            <p>Sample Management System · 3 minute bilingual explainer</p>
          </div>
        </div>
        <div class="controls">
          <button id="play" type="button">暂停 / Pause</button>
          <button id="restart" type="button">重播 / Replay</button>
          <button id="prevStep" type="button">上一步 / Prev</button>
          <button id="nextStep" type="button">下一步 / Next</button>
          <a href="./samplefit-bilingual.vtt" download>字幕 VTT / Captions</a>
          <a href="./samplefit-bilingual-script.json" download>脚本 JSON / Script</a>
          <a href="../">返回系统 / Back</a>
        </div>
      </header>

      <section class="stage">
        <aside class="side-rail">
          <button class="active" type="button">后台 / Admin</button>
          <button type="button">前台 / Sales</button>
          <button type="button">AI</button>
          <button type="button">账单 / Billing</button>
        </aside>

        <section class="main-stage" id="stage" aria-live="polite"></section>

        <aside class="right-panel">
          <div class="glass timeline">
            <h3>时间轴 / Timeline</h3>
            <div class="progress"><i id="progress"></i></div>
            <strong id="timecode">00:00 / 03:00</strong>
          </div>
          <div class="glass chapter-list">
            <ol id="chapters"></ol>
          </div>
        </aside>
      </section>

      <footer class="caption">
        <strong id="caption-title">系统总览 / System overview</strong>
        <p id="actionCaption" class="action-caption">跟随光标查看操作步骤 / Follow the cursor to read each step</p>
        <p id="caption-zh" class="subtitle-zh">中文</p>
        <p id="caption-en" class="subtitle-en">English</p>
      </footer>
    </main>

    <script>
      const imageSet = [
        "../design-images/sj-2607-021-front.jpg",
        "../design-images/sj-2607-021-back.jpg",
        "../design-images/sj-2607-028-front.jpg",
        "../design-images/sj-2607-042-front.jpg",
        "../design-images/sj-2607-049-front.jpg",
        "../bulk-images/dh-2607-001-front.jpg"
      ];
      const duration = 180;
      let scenes = [];
      let startedAt = performance.now();
      let pausedAt = 0;
      let paused = false;
      let activeIndex = -1;
      let activeActionKey = "";

      const stage = document.getElementById("stage");
      const chapters = document.getElementById("chapters");
      const progress = document.getElementById("progress");
      const timecode = document.getElementById("timecode");
      const captionTitle = document.getElementById("caption-title");
      const actionCaption = document.getElementById("actionCaption");
      const captionZh = document.getElementById("caption-zh");
      const captionEn = document.getElementById("caption-en");
      const playButton = document.getElementById("play");
      const restartButton = document.getElementById("restart");
      const prevStepButton = document.getElementById("prevStep");
      const nextStepButton = document.getElementById("nextStep");

      fetch("./samplefit-bilingual-script.json")
        .then((response) => response.json())
        .then((payload) => {
          scenes = payload.scenes;
          buildScenes();
          requestAnimationFrame(tick);
        });

      playButton.addEventListener("click", () => {
        paused = !paused;
        if (paused) {
          pausedAt = performance.now();
          playButton.textContent = "继续 / Play";
        } else {
          startedAt += performance.now() - pausedAt;
          playButton.textContent = "暂停 / Pause";
          requestAnimationFrame(tick);
        }
      });

      restartButton.addEventListener("click", () => {
        startedAt = performance.now();
        activeIndex = -1;
        paused = false;
        playButton.textContent = "暂停 / Pause";
        requestAnimationFrame(tick);
      });

      prevStepButton.addEventListener("click", () => {
        const current = currentElapsed();
        const steps = allSteps();
        if (!steps.length) {
          return;
        }
        const currentStep = stepAtTime(current);
        const target = steps[Math.max(0, currentStep.globalIndex - 1)];
        goToStep(target.time);
      });

      nextStepButton.addEventListener("click", () => {
        const current = currentElapsed();
        const steps = allSteps();
        if (!steps.length) {
          return;
        }
        const currentStep = stepAtTime(current);
        const target = steps[Math.min(steps.length - 1, currentStep.globalIndex + 1)];
        goToStep(target.time);
      });

      stage.addEventListener("click", (event) => {
        const target = event.target.closest("[data-step-jump]");
        if (!target) {
          return;
        }
        goToStep(Number(target.dataset.stepJump || 0));
      });

      chapters.addEventListener("click", (event) => {
        const target = event.target.closest("[data-step-jump]");
        if (!target) {
          return;
        }
        goToStep(Number(target.dataset.stepJump || 0));
      });

      function buildScenes() {
        stage.innerHTML = `
          ${scenes.map((scene, index) => renderScene(scene, index)).join("")}
          <div class="motion-layer" aria-hidden="true">
            <span class="click-ring"></span>
            <span class="tour-cursor"></span>
            <span class="action-bubble" id="motionBubble"></span>
          </div>
        `;
        chapters.innerHTML = scenes
          .map(
            (scene, index) =>
              `<li data-index="${index}" data-step-jump="${scene.start + 0.1}" role="button" tabindex="0">${time(scene.start)} ${scene.titleZh}<br>${scene.titleEn}</li>`
          )
          .join("");
      }

      function renderScene(scene, index) {
        const visual = [
          customerMeetingVisual(),
          phoneVisual("前台登录 / Sign in", imageSet[0]),
          waterfallVisual(),
          visualSearchVisual(),
          favoriteVisual(),
          detailVisual(),
          pptVisual(),
          loanRequestVisual(),
          loanAdminVisual(),
          intakeVisual(),
          aiVisual(),
          analyticsVisual()
        ][index] || overviewVisual();

        return `
          <article class="scene-card" data-scene="${index}">
            <div class="scene-copy">
              <small>${time(scene.start)} - ${time(scene.end)}</small>
              <h2>${scene.titleZh}<br>${scene.titleEn}</h2>
              <p>${scene.zh}</p>
              <p>${scene.en}</p>
              ${renderProcessStrip(scene)}
            </div>
            <div class="visual">${visual}</div>
          </article>
        `;
      }

      function renderProcessStrip(scene) {
        const actions = scene.actions || [];
        if (!actions.length) {
          return "";
        }
        return `
          <div class="process-strip">
            ${actions
              .map((action, index) => {
                const stepTime = scene.start + ((scene.end - scene.start) / actions.length) * index + 0.1;
                return `<button data-action-step="${index}" data-step-jump="${stepTime}" type="button">${index + 1}. ${action.labelEn}</button>`;
              })
              .join("")}
          </div>
        `;
      }

      function customerMeetingVisual() {
        return `
          <div class="detail-mock">
            <div class="chat-card">
              <div class="mini-row"><strong>客户需求</strong><span>欧洲市场</span></div>
              <div class="mini-row"><strong>风格方向</strong><span>轻户外 / 浅色系</span></div>
              <div class="mini-row"><strong>参考图片</strong><span>现场上传搜款</span></div>
              <div class="mini-row"><strong>业务目标</strong><span>马上找可借可推款</span></div>
            </div>
            <div class="phone">
              <div class="phone-bar">Client Meeting</div>
              <img alt="" src="${imageSet[4]}" />
              <div class="search-pill">客户参考图 / Reference</div>
            </div>
          </div>
        `;
      }

      function overviewVisual() {
        return `
          <div class="hud-grid">
            <div class="hud-card"><span>Online samples</span><strong>100</strong><span>设计样衣 + 大货样品</span></div>
            <div class="hud-card"><span>AI credits</span><strong>1200</strong><span>补全、搜款、白底图</span></div>
            <div class="hud-card"><span>Loan flow</span><strong>前台申请</strong><span>后台确认借出</span></div>
            <div class="hud-card"><span>Billing</span><strong>业务组</strong><span>按周、月、年拉取</span></div>
          </div>
        `;
      }

      function portalVisual() {
        return `
          <div class="chat-card">
            <div class="search-pill">中文 | English · AI 积分 1200</div>
            <div class="mini-row"><strong>设计部后台</strong><span>入库 / 借还 / 账单 / 分析</span></div>

      function allSteps() {
        return scenes.flatMap((scene, sceneIndex) => {
          const actions = scene.actions || [];
          if (!actions.length) {
            return [{ sceneIndex, actionIndex: 0, time: scene.start + 0.1 }];
          }
          const span = (scene.end - scene.start) / actions.length;
          return actions.map((action, actionIndex) => ({
            sceneIndex,
            actionIndex,
            time: scene.start + span * actionIndex + 0.1,
            action
          }));
        });
      }

      function currentElapsed() {
        return Math.max(0, Math.min(duration, (performance.now() - startedAt) / 1000));
      }

      function goToStep(targetSeconds) {
        startedAt = performance.now() - Math.max(0, Math.min(duration - 0.1, targetSeconds)) * 1000;
        activeIndex = -1;
        activeActionKey = "";
        paused = false;
        playButton.textContent = "暂停 / Pause";
        requestAnimationFrame(tick);
      }

      function stepAtTime(elapsed) {
        const steps = allSteps();
        if (!steps.length) {
          return { sceneIndex: 0, actionIndex: 0, time: 0, globalIndex: 0 };
        }
        let globalIndex = 0;
        for (let index = 0; index < steps.length; index += 1) {
          if (steps[index].time <= elapsed + 0.3) {
            globalIndex = index;
          }
        }
        return { ...steps[globalIndex], globalIndex };
      }

      function tick(now) {
        if (paused || !scenes.length) {
          return;
        }
        const elapsed = Math.min(duration, (now - startedAt) / 1000);
        const sceneIndex = scenes.findIndex((scene) => elapsed >= scene.start && elapsed < scene.end);
        const index = sceneIndex === -1 ? scenes.length - 1 : sceneIndex;
        if (index !== activeIndex) {
          activeIndex = index;
          activeActionKey = "";
          document.querySelectorAll(".scene-card").forEach((node) => node.classList.toggle("active", Number(node.dataset.scene) === index));
          document.querySelectorAll(".chapter-list li").forEach((node) => node.classList.toggle("active", Number(node.dataset.index) === index));
          const scene = scenes[index];
          captionTitle.textContent = `${scene.titleZh} / ${scene.titleEn}`;
          captionZh.textContent = scene.zh;
          captionEn.textContent = scene.en;
        }
        updateAction(index, elapsed);
        progress.style.width = `${(elapsed / duration) * 100}%`;
        timecode.textContent = `${time(elapsed)} / 03:00`;
        if (elapsed < duration) {
          requestAnimationFrame(tick);
        } else {
          paused = true;
          playButton.textContent = "重播 / Replay";
        }
      }

      function updateAction(index, elapsed) {
        const scene = scenes[index];
        const actions = scene.actions || [];
        if (!actions.length) {
          stage.classList.remove("is-clicking", "is-dragging");
          actionCaption.textContent = "跟随光标查看操作步骤 / Follow the cursor to read each step";
          return;
        }

        const sceneDuration = Math.max(1, scene.end - scene.start);
        const sceneProgress = Math.max(0, Math.min(0.999, (elapsed - scene.start) / sceneDuration));
        const actionIndex = Math.min(actions.length - 1, Math.floor(sceneProgress * actions.length));
        const action = actions[actionIndex];
        const actionKey = `${index}:${actionIndex}`;

        stage.style.setProperty("--cursor-x", `${action.x}%`);
        stage.style.setProperty("--cursor-y", `${action.y}%`);
        stage.classList.toggle("is-clicking", action.type === "click");
        stage.classList.toggle("is-dragging", action.type === "drag");

        document.querySelectorAll(".scene-card.active [data-action-step]").forEach((node) => {
          node.classList.toggle("active", Number(node.dataset.actionStep) === actionIndex);
        });

        if (actionKey !== activeActionKey) {
          activeActionKey = actionKey;
          actionCaption.textContent = `${action.labelZh} / ${action.labelEn}`;
          const bubble = document.getElementById("motionBubble");
          if (bubble) {
            bubble.innerHTML = `${action.labelZh}<small>${action.labelEn}</small>`;
          }
        }
      }

      function time(value) {
        const seconds = Math.max(0, Math.floor(value));
        const minutes = Math.floor(seconds / 60);
        const rest = String(seconds % 60).padStart(2, "0");
        return `${String(minutes).padStart(2, "0")}:${rest}`;
      }
    </script>
